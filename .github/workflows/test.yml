name: CICD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repo code
        uses: actions/checkout@v4
      - name: Set up python
        if: ${{ !env.ACT }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Use preinstalled Python in act
        if: ${{ env.ACT }}
        run: python3 --version
      - name: Create virtual environment
        run: python3 -m venv .venv
      - name: Install app dependencies
        run: .venv/bin/python -m pip install -r requirements.txt
      - name: Install test dependencies
        run: .venv/bin/python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: .venv/bin/python -m pytest

  build-and-push-image:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set short SHA tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/learning-backend:${IMAGE_TAG} app
      - name: Push image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/learning-backend:${IMAGE_TAG}
