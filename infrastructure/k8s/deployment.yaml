apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: learning-backend
  template:
    metadata:
      labels:
        app: learning-backend
    spec:
      containers:
        - name: api
          image: ghcr.io/allamta/learning-backend:5779bd4
          ports:
            - containerPort: 8080
